<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>PLAYER_ONE — Birthday Edition</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

<!-- Confetti Layer (over everything) -->
<div id="confettiContainer"></div>

<!-- Mode Select Modal (full-screen, shown on load) -->
<div id="modeSelectModal">
  <div class="mode-select-screen">
    <div class="mode-title">SELECT MODE</div>
    <div class="mode-subtitle">WHO ARE YOU PLAYING AS?</div>
    <div class="mode-cards">
      <button class="mode-card mode-card--birthday" onclick="window.selectMode('birthday')">
        <div class="mode-card-icon">🎂</div>
        <div class="mode-card-name">BIRTHDAY</div>
        <div class="mode-card-desc">38 levels to the<br>big surprise.<br>No checkpoints.</div>
      </button>
      <button class="mode-card mode-card--classic" onclick="window.selectMode('classic')">
        <div class="mode-card-icon">🕹️</div>
        <div class="mode-card-name">CLASSIC</div>
        <div class="mode-card-desc">3 hearts per level.<br>Checkpoints saved.<br>Quotes after levels.</div>
      </button>
    </div>
  </div>
</div>

<!-- ─── Top Nav ──────────────────────────────────────────────────────────── -->
<nav class="top-nav">
  <div class="nav-logo">
    <span class="material-symbols-outlined" style="font-size:16px">videogame_asset</span>
    PLAYER_ONE
  </div>
  <div class="nav-status">
    <span class="status-dot"></span> SYSTEM ONLINE
  </div>
</nav>

<!-- ─── Main ──────────────────────────────────────────────────────────────── -->
<main>

  <!-- HUD -->
  <div class="hud" id="hud">
    <div class="hud-block" id="scoreBlock">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="scoreVal">000000</span>
    </div>

    <!-- Hearts — only visible in Classic mode, toggled by JS -->
    <div class="hud-block" id="heartsBlock" style="display:none; align-items:center;">
      <span class="hud-label">LIVES</span>
      <span class="hud-val" id="heartsVal" style="color:var(--secondary);letter-spacing:2px;">♥♥♥</span>
    </div>

    <div class="hud-block" id="highScoreBlock" style="align-items:flex-end">
      <span class="hud-label">HIGH SCORE</span>
      <span class="hud-val hi" id="highScoreVal">000000</span>
    </div>
  </div>

  <!-- Level Badge (outside the game canvas) -->
  <div class="level-badge">LVL <span id="levelVal">01</span></div>

  <!-- Game Screen -->
  <div class="game-wrap" id="gameWrap">
    <!-- CRT Scanline Overlay -->
    <div class="absolute inset-0 crt-overlay" style="position:absolute;inset:0"></div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Game Overlay -->
    <div id="overlay" class="hidden">
      <div id="overlayInner"></div>
    </div>

    <!-- Quote Box -->
    <div id="quoteBox" class="hidden">
      <div id="quoteText"></div>
      <div class="quote-meta">
        <span id="quoteDirector"></span>
        <span id="quoteFilm"></span>
      </div>
      <div class="quote-tap">TAP TO CONTINUE ▶</div>
    </div>
  </div>

  <!-- ─── Controls ─────────────────────────────────────────────────────── -->
  <div class="controls-row">
    <button class="ctrl-icon-btn" id="btnSelect" aria-label="Pause">
      <span class="material-symbols-outlined">pause</span>
    </button>

    <!-- Touch hint (visible on touch devices only) -->
    <div class="touch-hint" id="touchHint">
      <span class="material-symbols-outlined" style="font-size:16px;">swipe</span>
      SWIPE TO MOVE
    </div>

    <!-- Keyboard hint (visible on desktop only) -->
    <div class="keyboard-hint" id="keyboardHint">
      <span class="key-cap">↑</span><span class="key-cap">↓</span><span class="key-cap">←</span><span class="key-cap">→</span>
      <span class="hint-text">or</span>
      <span class="key-cap">W</span><span class="key-cap">A</span><span class="key-cap">S</span><span class="key-cap">D</span>
    </div>

    <button class="ctrl-icon-btn ctrl-icon-btn--start" id="btnStart" aria-label="Start">
      <span class="material-symbols-outlined">play_arrow</span>
    </button>
  </div>

  <!-- ─── Journey Tracker ────────────────────────────────────────────── -->
  <div class="journey-section">
    <div class="journey-header">
      <span class="journey-icon">🛤️</span>
      <span class="journey-title" id="achieveText">SELECT A MODE TO BEGIN</span>
    </div>
    <div class="journey-bar-wrap">
      <div class="journey-bar" id="achieveBar">
        <div class="journey-bar-glow"></div>
      </div>
      <div class="journey-milestones">
        <span class="milestone" data-level="1">1</span>
        <span class="milestone" data-level="10">10</span>
        <span class="milestone" data-level="20">20</span>
        <span class="milestone" data-level="30">30</span>
        <span class="milestone cake-milestone" data-level="38">🎂</span>
      </div>
    </div>
    <div class="journey-objective" id="nextUnlockLabel">
      <span class="obj-dot"></span> CHOOSE YOUR MODE ABOVE
    </div>
  </div>

  <!-- ─── Footer ────────────────────────────────────────────────────── -->
  <footer class="game-footer">
    <span>made with 🖤 by <a href="https://www.linkedin.com/in/deepak-manian-/" target="_blank" rel="noopener noreferrer">Deepak</a></span>
  </footer>

</main>

<!-- Game Script (type=module for ES imports) -->
<script src="src/game.js"></script>

</body>
</html>
