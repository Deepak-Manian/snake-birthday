<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <title>PLAYER_ONE — Birthday Edition</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="src/style.css" />
</head>
<body>

<!-- Confetti Layer (over everything) -->
<div id="confettiContainer"></div>

<!-- ─── Top Nav ──────────────────────────────────────────────────────────── -->
<nav class="top-nav">
  <div class="nav-logo">
    <span class="material-symbols-outlined" style="font-size:16px">videogame_asset</span>
    PLAYER_ONE
  </div>
  <div class="nav-status">
    <span class="status-dot"></span> SYSTEM ONLINE
  </div>
</nav>

<!-- ─── Main ──────────────────────────────────────────────────────────────── -->
<main>

  <!-- HUD (Moved outside of game screen) -->
  <div class="hud">
    <div class="hud-block">
      <span class="hud-label">SCORE</span>
      <span class="hud-val" id="scoreVal">000000</span>
    </div>
    <div class="hud-block" style="align-items:flex-end">
      <span class="hud-label">HIGH SCORE</span>
      <span class="hud-val hi" id="highScoreVal">000000</span>
    </div>
  </div>

  <!-- Game Screen -->
  <div class="game-wrap" id="gameWrap">
    <!-- CRT Scanline Overlay -->
    <div class="absolute inset-0 crt-overlay" style="position:absolute;inset:0"></div>

    <!-- Level Badge -->
    <div class="level-badge">LVL <span id="levelVal">01</span></div>

    <!-- Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Game Overlay -->
    <div id="overlay" class="hidden">
      <div id="overlayInner"></div>
    </div>

    <!-- Quote Box -->
    <div id="quoteBox" class="hidden">
      <div id="quoteText"></div>
      <div class="quote-meta">
        <span id="quoteDirector"></span>
        <span id="quoteFilm"></span>
      </div>
      <div class="quote-tap">TAP TO CONTINUE ▶</div>
    </div>
  </div>

  <!-- ─── Controls ─────────────────────────────────────────────────────── -->
  <div class="controls-section">

    <!-- D-Pad -->
    <div class="dpad">
      <div></div>
      <button class="dpad-btn" id="btnUp" aria-label="Up">
        <span class="material-symbols-outlined">arrow_drop_up</span>
      </button>
      <div></div>
      <button class="dpad-btn" id="btnLeft" aria-label="Left">
        <span class="material-symbols-outlined">arrow_left</span>
      </button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" id="btnRight" aria-label="Right">
        <span class="material-symbols-outlined">arrow_right</span>
      </button>
      <div></div>
      <button class="dpad-btn" id="btnDown" aria-label="Down">
        <span class="material-symbols-outlined">arrow_drop_down</span>
      </button>
      <div></div>
    </div>

    <!-- Start / Select -->
    <div class="action-btns">
      <div class="action-btn-wrap">
        <button class="action-btn" id="btnSelect" aria-label="Pause"></button>
        <span class="action-label">Pause</span>
      </div>
      <div class="action-btn-wrap">
        <button class="action-btn" id="btnStart" aria-label="Start" style="background:rgba(160,255,195,0.4)"></button>
        <span class="action-label">Start</span>
      </div>
    </div>
  </div>

  <!-- ─── Stats Bento ────────────────────────────────────────────────── -->
  <div class="bento">
    <div class="bento-card">
      <span class="bento-label">Session Progress</span>
      <div class="bento-val" id="achieveText">LEVEL 1 — 0 EATEN</div>
      <div class="achieve-bar-wrap"><div id="achieveBar"></div></div>
    </div>
    <div class="bento-card">
      <span class="bento-label">Global Rank</span>
      <div class="bento-val">ELITE_PILOT_01</div>
    </div>
    <div class="bento-card">
      <span class="bento-label">Next Reward</span>
      <div class="bento-val" id="nextUnlockLabel">AGE 38 UNLOCK</div>
    </div>
  </div>

</main>

<!-- Game Script (type=module for ES imports) -->
<script type="module" src="src/game.js"></script>

</body>
</html>
